version: "3.8"

services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src/public/uploads:/app/backend/public/uploads
      - ./backend/src/public/images:/app/backend/public/images
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: postgre_db_ticketa
    restart: always
    environment:
      - POSTGRES_USER=fronli
      - POSTGRES_PASSWORD=fronli
      - POSTGRES_DB=ticketa
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
   external: true