<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>EO Dashboard - Ticketa</title>
	<link rel="stylesheet" href="eopage/style.css">
</head>
<body>
	<!-- Topbar -->
	<header class="topbar">
		<div class="brand-wrap">
			<a class="brand" href="/" aria-label="Beranda Ticketa">
				<span class="brand-name title-dashboard">Event Organizer Dashboard</span>
			</a>
		</div>
		<div class="top-actions" id="topActions">
			<!-- Profile Placeholder (Diisi oleh JS) -->
			<div class="user-profile-skeleton" style="display: flex; align-items: center; gap: 8px;">
				<span style="font-size: 0.85rem; font-weight: 700; color: var(--text);">Loading Profile...</span>
				<div style="width: 32px; height: 32px; border-radius: 50%; background: #e0e0e0;"></div>
			</div>
		</div>
	</header>

	<div class="dashboard-layout">
		<!-- Sidebar -->
		<aside class="sidebar">
			<nav class="side-nav">
				<a href="/eopage/index.html" class="nav-item active">
					<div class="nav-icon"></div>
					Dashboard
				</a>
				<a href="#" class="nav-item">
					<div class="nav-icon disabled"></div>
					Create Event
				</a>
				<a href="#" class="nav-item">
					<div class="nav-icon disabled"></div>
					Manage Event
				</a>
				<a href="#" class="nav-item">
					<div class="nav-icon disabled"></div>
					Ticket Scanner
				</a>
			</nav>
		</aside>

		<!-- Main Content -->
		<main class="main-content">
			<!-- Summary Cards -->
			<div class="metrics-grid">
				<div class="metric-card">
					<div class="metric-icon-placeholder"></div>
					<div class="metric-info">
						<span class="metric-label">TOTAL TICKET SALES</span>
						<h2 class="metric-value">0</h2>
					</div>
				</div>
				<div class="metric-card">
					<div class="metric-icon-placeholder"></div>
					<div class="metric-info">
						<span class="metric-label">ACTIVE EVENTS</span>
						<h2 class="metric-value">0</h2>
					</div>
				</div>
				<div class="metric-card">
					<div class="metric-icon-placeholder"></div>
					<div class="metric-info">
						<span class="metric-label">AVG. PERFORMANCE</span>
						<h2 class="metric-value">0%</h2>
					</div>
				</div>
			</div>

			<!-- Events Section -->
			<section class="events-section">
				<div class="events-header">
					<h2>Your Events</h2>
					<a href="#" class="btn-create-event">Create New Event</a>
				</div>

				<div class="table-container">
					<table class="events-table">
						<thead>
							<tr>
								<th>DATE</th>
								<th>LOCATION</th>
								<th>SALES</th>
								<th>STATUS</th>
								<th class="actions-col"></th>
							</tr>
						</thead>
						<tbody id="eventsTableBody">
							<!-- Data event akan di-generate oleh script.js -->
						</tbody>
					</table>
					
					<!-- Empty State (Sembunyi by default) -->
					<div id="emptyState" class="empty-state" style="display: none;">
						<p>You haven't created any events yet.</p>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script src="eopage/script.js"></script>
</body>
</html>
