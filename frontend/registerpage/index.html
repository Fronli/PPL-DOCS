<!DOCTYPE html>
<html lang="id">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Register - Ticketa</title>
	<link rel="stylesheet" href="/loginpage/style.css" />
	<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
	<header class="topbar">
		<div class="nav-left">
			<a class="brand" href="/" aria-label="Beranda Ticketa">
				<img src="/images/icon/icon.png" alt="Ticketa" class="brand-logo" />
			</a>
		</div>
		<nav class="nav-center">
			<a href="#">Home</a>
			<a href="#">Explore Events</a>
			<a href="#">Become an Organizer</a>
		</nav>
		<div class="nav-right">
			<!-- Opsi login ada di form, bagian ini bisa disesuaikan nanti -->
		</div>
	</header>

	<main class="auth-wrapper">
		<div class="auth-card">
			<div class="auth-header">
				<h2>Get Started</h2>
				<p>Create an account to book your next experience.</p>
			</div>

			<form action="#" method="POST" class="auth-form">
				<div class="form-group">
					<label for="name">Full Name</label>
					<input type="text" id="name" name="name" placeholder="e.g. Alex Johnson" required />
				</div>
				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" placeholder="name@example.com" required />
				</div>
				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="At least 8 characters" required />
				</div>
				<button type="submit" class="btn-primary">Create My Account</button>
			</form>

			<div class="divider">
				<span>OR REGISTER WITH</span>
			</div>

			<div id="g_id_onload"
				data-client_id="688387656293-h8cg8vh14qvosdls2fld7ubec10vlt8k.apps.googleusercontent.com"
				data-context="signup"
				data-ux_mode="popup"
				data-callback="handleGoogleResponse"
				data-auto_prompt="false">
			</div>

			<div class="google-btn-wrapper">
				<div class="g_id_signin"
					data-type="standard"
					data-shape="rectangular"
					data-theme="outline"
					data-text="signup_with"
					data-size="large"
					data-width="360"
					data-logo_alignment="center">
				</div>
			</div>

			<p class="auth-footer">
				Already have an account? <a href="/auth/login">Log in here</a>
			</p>
		</div>
	</main>
	<script src="/registerpage/script.js"></script>
</body>
</html>
